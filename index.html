<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Do Not Press</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <button onclick="handleClick()" style="padding:15px 30px; font-size:18px;">
        Do not press
    </button>

    <p id="message" style="margin-top:20px; font-size:20px; color:red;"></p>

    <!-- Fart sound (you can replace with any sound URL) -->
    <audio id="fartSound">
        <source src="https://www.myinstants.com/media/sounds/fart.mp3" type="audio/mpeg">
    </audio>

    <script>
        function handleClick() {
            document.getElementById("message").innerText = "You idiot can’t you read";
            document.getElementById("fartSound").play();
        }
    </script>

</body>
</html>
